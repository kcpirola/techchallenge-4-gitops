# App-of-Apps pattern: este único Application no ArgoCD
# gerencia todos os 5 microsserviços do ToggleMaster.
#
# Para aplicar:
#   kubectl apply -f gitops/argocd/applications.yaml -n argocd
#
# Substitua cltcansado pelo seu usuário/org do GitHub.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: togglemaster
  source:
    repoURL: https://github.com/kcpirola/techchallenge-4-gitops.git
    targetRevision: main
    path: manifests/auth-service
  destination:
    server: https://kubernetes.default.svc
    namespace: togglemaster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
