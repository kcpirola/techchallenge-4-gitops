# Credencial do repositório GitOps PRIVADO para o ArgoCD
#
# INSTRUÇÕES:
#   1. Copie este arquivo: cp repo-secret-template.yaml repo-secret.yaml
#   2. Substitua <GITOPS_PAT> pelo Personal Access Token com escopo "repo"
#   3. Aplique: kubectl apply -f repo-secret.yaml -n argocd
#   4. NUNCA commite repo-secret.yaml (adicione ao .gitignore)
#
# O PAT precisa de escopo "repo" (não apenas "public_repo") para repos privados.
# Gere em: https://github.com/settings/tokens → Fine-grained tokens → Repository access
---
apiVersion: v1
kind: Secret
metadata:
  name: techchallenge-4-gitops-repo-creds
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/kcpirola/techchallenge-4-gitops.git
  username: git
  password: <GITOPS_PAT>
